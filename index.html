<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Black Fabric Flag</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #74c7ff 0%, #bfe9ff 45%, #f7fbff 100%);
    }

    /* Sky */
    .sky {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Sun glow */
    .sun {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #fff9b1 0%, #ffd76a 45%, rgba(255, 215, 106, 0) 70%);
      border-radius: 50%;
      opacity: 0.9;
      animation: sunGlow 4s ease-in-out infinite alternate;
    }

    @keyframes sunGlow {
      from {
        transform: scale(1);
        opacity: 0.75;
      }
      to {
        transform: scale(1.12);
        opacity: 1;
      }
    }

    /* Moving clouds */
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 50px;
      filter: blur(1px);
      animation: cloudMove linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
    }

    .cloud1 {
      width: 180px;
      height: 55px;
      top: 17%;
      left: -250px;
      animation-duration: 36s;
    }

    .cloud1::before {
      width: 80px;
      height: 80px;
      top: -35px;
      left: 35px;
    }

    .cloud1::after {
      width: 100px;
      height: 100px;
      top: -50px;
      right: 25px;
    }

    .cloud2 {
      width: 260px;
      height: 70px;
      top: 38%;
      left: -350px;
      animation-duration: 50s;
      opacity: 0.75;
    }

    .cloud2::before {
      width: 110px;
      height: 110px;
      top: -55px;
      left: 45px;
    }

    .cloud2::after {
      width: 135px;
      height: 135px;
      top: -70px;
      right: 35px;
    }

    .cloud3 {
      width: 140px;
      height: 45px;
      top: 62%;
      left: -180px;
      animation-duration: 42s;
      opacity: 0.65;
    }

    .cloud3::before {
      width: 65px;
      height: 65px;
      top: -28px;
      left: 25px;
    }

    .cloud3::after {
      width: 80px;
      height: 80px;
      top: -38px;
      right: 18px;
    }

    @keyframes cloudMove {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(140vw);
      }
    }

    /* Main title */
    .title {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #111;
      z-index: 10;
      text-shadow: 0 3px 10px rgba(255, 255, 255, 0.7);
    }

    .title h1 {
      font-size: clamp(32px, 5vw, 72px);
      letter-spacing: 2px;
      font-weight: 900;
    }

    .title p {
      margin-top: 10px;
      font-size: clamp(16px, 2vw, 28px);
      font-weight: 700;
    }

    /* Flag area */
    .flag-scene {
      position: absolute;
      left: 50%;
      top: 53%;
      transform: translate(-50%, -50%);
      width: min(900px, 95vw);
      height: 560px;
      z-index: 5;
    }

    /* Flag pole */
    .pole {
      position: absolute;
      left: 145px;
      top: 65px;
      width: 18px;
      height: 470px;
      background: linear-gradient(to right, #555, #e2e2e2, #777, #222);
      border-radius: 12px;
      box-shadow: 8px 12px 25px rgba(0, 0, 0, 0.35);
      z-index: 3;
    }

    .pole::before {
      content: "";
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff, #b8b8b8, #444);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
    }

    .pole-base {
      position: absolute;
      left: 88px;
      bottom: 0;
      width: 130px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle, #999, #333);
      box-shadow: 0 14px 25px rgba(0, 0, 0, 0.4);
      z-index: 2;
    }

    /* Waving flag wrapper */
    .flag-wrap {
      position: absolute;
      left: 155px;
      top: 92px;
      width: 610px;
      height: 330px;
      perspective: 900px;
      transform-origin: left center;
      animation: flagFloat 4s ease-in-out infinite;
      z-index: 4;
    }

    @keyframes flagFloat {
      0%, 100% {
        transform: rotate(-2deg) translateY(0);
      }
      50% {
        transform: rotate(2deg) translateY(-10px);
      }
    }

    /* Black fabric flag */
    .flag {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 0 18px 18px 0;
      background:
        linear-gradient(90deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(0, 0, 0, 0.45) 12%,
          rgba(255, 255, 255, 0.1) 24%,
          rgba(0, 0, 0, 0.55) 38%,
          rgba(255, 255, 255, 0.08) 52%,
          rgba(0, 0, 0, 0.45) 68%,
          rgba(255, 255, 255, 0.12) 82%,
          rgba(0, 0, 0, 0.6) 100%),
        linear-gradient(135deg, #080808, #1a1a1a 45%, #000000);
      box-shadow:
        0 22px 45px rgba(0, 0, 0, 0.45),
        inset 0 0 40px rgba(255, 255, 255, 0.08),
        inset 0 -35px 70px rgba(0, 0, 0, 0.65);
      animation: waveFlag 2.4s ease-in-out infinite;
      transform-origin: left center;
    }

    @keyframes waveFlag {
      0% {
        transform: rotateY(0deg) skewY(0deg);
        border-radius: 0 20px 16px 0;
      }
      25% {
        transform: rotateY(-13deg) skewY(2deg);
        border-radius: 0 45px 10px 0;
      }
      50% {
        transform: rotateY(8deg) skewY(-2deg);
        border-radius: 0 18px 45px 0;
      }
      75% {
        transform: rotateY(-9deg) skewY(1deg);
        border-radius: 0 38px 18px 0;
      }
      100% {
        transform: rotateY(0deg) skewY(0deg);
        border-radius: 0 20px 16px 0;
      }
    }

    /* Extra fabric waves */
    .flag::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.12) 0px,
          rgba(255, 255, 255, 0.03) 35px,
          rgba(0, 0, 0, 0.38) 70px,
          rgba(255, 255, 255, 0.08) 105px
        );
      mix-blend-mode: screen;
      opacity: 0.55;
      animation: fabricLight 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes fabricLight {
      0%, 100% {
        transform: translateX(0);
        opacity: 0.45;
      }
      50% {
        transform: translateX(25px);
        opacity: 0.75;
      }
    }

    .flag::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.25;
      pointer-events: none;
    }

    /* Logo on flag */
    .flag-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72%;
      max-height: 78%;
      object-fit: contain;
      transform: translate(-50%, -50%);
      filter:
        drop-shadow(0 8px 12px rgba(0, 0, 0, 0.75))
        drop-shadow(0 0 16px rgba(255, 255, 255, 0.35));
      animation: logoWave 2.4s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes logoWave {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1) skewY(0deg);
      }
      25% {
        transform: translate(-49%, -50%) scale(1.02) skewY(1.5deg);
      }
      50% {
        transform: translate(-51%, -50%) scale(0.98) skewY(-1.5deg);
      }
      75% {
        transform: translate(-49.5%, -50%) scale(1.01) skewY(1deg);
      }
    }

    /* Rope clips */
    .clip {
      position: absolute;
      left: -8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle, #eeeeee, #777, #222);
      box-shadow: 0 3px 8px rgba(0,0,0,0.4);
      z-index: 6;
    }

    .clip.top {
      top: 15px;
    }

    .clip.bottom {
      bottom: 15px;
    }

    /* Wind lines */
    .wind {
      position: absolute;
      height: 4px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 10px;
      filter: blur(0.5px);
      animation: windMove 2.8s linear infinite;
      z-index: 1;
    }

    .wind1 {
      width: 180px;
      top: 205px;
      left: -180px;
    }

    .wind2 {
      width: 120px;
      top: 280px;
      left: -260px;
      animation-delay: 0.7s;
    }

    .wind3 {
      width: 230px;
      top: 355px;
      left: -350px;
      animation-delay: 1.3s;
    }

    @keyframes windMove {
      from {
        transform: translateX(0);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      to {
        transform: translateX(1200px);
        opacity: 0;
      }
    }

    /* Bottom grass / horizon */
    .ground {
      position: absolute;
      bottom: -35px;
      left: 0;
      width: 100%;
      height: 140px;
      background: linear-gradient(to bottom, #4aa03f, #1f5e24);
      border-radius: 50% 50% 0 0;
      box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.12);
      z-index: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .flag-scene {
        transform: translate(-50%, -50%) scale(0.68);
      }

      .title {
        top: 24px;
        width: 90%;
      }
    }

    @media (max-width: 480px) {
      .flag-scene {
        transform: translate(-50%, -45%) scale(0.52);
      }
    }
  </style>
</head>

<body>
  <div class="sky">

    <div class="sun"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="title">
      <h1>Newson Sportec</h1>
      <p>Black Fabric Flag Flying in the Sky</p>
    </div>

    <div class="wind wind1"></div>
    <div class="wind wind2"></div>
    <div class="wind wind3"></div>

    <div class="flag-scene">
      <div class="pole"></div>
      <div class="pole-base"></div>

      <div class="flag-wrap">
        <div class="flag">
          <span class="clip top"></span>
          <span class="clip bottom"></span>
          <img src="logo.png" alt="Newson Sportec Logo" class="flag-logo" />
        </div>
      </div>
    </div>

    <div class="ground"></div>

  </div>
</body>
</html>
