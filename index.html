<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Waving Flag</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      overflow: hidden;

      background:
        radial-gradient(circle at 50% 18%, rgba(255, 174, 66, 0.8), transparent 16%),
        linear-gradient(
          to bottom,
          #12172f 0%,
          #2b1b45 30%,
          #7f2f17 58%,
          #d8781d 78%,
          #201005 100%
        );
    }

    .page {
      width: 100%;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .page::before {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -90px;
      height: 280px;
      background:
        radial-gradient(circle at 30% 40%, rgba(255, 190, 95, 0.4), transparent 34%),
        linear-gradient(to top, #160b04, #7a3b12, transparent);
      border-radius: 50% 50% 0 0;
      z-index: 0;
    }

    .page::after {
      content: "";
      position: absolute;
      left: -25%;
      bottom: 105px;
      width: 150%;
      height: 150px;
      background:
        radial-gradient(circle, rgba(255, 220, 160, 0.24) 0%, transparent 58%),
        radial-gradient(circle, rgba(255, 170, 75, 0.2) 0%, transparent 62%);
      filter: blur(28px);
      animation: dustMove 6s ease-in-out infinite;
      z-index: 1;
    }

    h1 {
      position: relative;
      z-index: 5;
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 76px);
      letter-spacing: 4px;
      color: #ff8a00;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 138, 0, 0.8),
        0 0 30px rgba(255, 138, 0, 0.45);
    }

    .subtitle {
      position: relative;
      z-index: 5;
      margin-bottom: 25px;
      font-size: clamp(16px, 2vw, 26px);
      color: #f1f1f1;
      letter-spacing: 2px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.7);
    }

    .flag-scene {
      position: relative;
      z-index: 4;
      width: min(1100px, 96vw);
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1400px;
    }

    .sky-line {
      position: absolute;
      top: 72px;
      left: 8%;
      width: 84%;
      height: 5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
      border-radius: 20px;
      opacity: 0.75;
      transform: rotate(-3deg);
      z-index: 2;
      filter: blur(0.3px);
    }

    .flag {
      position: relative;
      width: min(980px, 94vw);
      height: 360px;
      transform-style: preserve-3d;
      transform-origin: left center;
      animation: flagSwing 4s ease-in-out infinite;
      filter:
        drop-shadow(0 38px 38px rgba(0,0,0,0.75))
        drop-shadow(0 0 26px rgba(255,138,0,0.25));
    }

    .flag-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform-origin: left center;
      animation: imageWave 2.8s ease-in-out infinite;
      clip-path: polygon(
        0% 9%,
        100% 0%,
        96% 50%,
        100% 98%,
        0% 93%
      );
    }

    .flag::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.22) 0px,
          rgba(255,255,255,0.04) 35px,
          rgba(0,0,0,0.42) 70px,
          rgba(0,0,0,0.08) 115px
        );
      mix-blend-mode: overlay;
      opacity: 0.72;
      animation: foldMove 2.8s ease-in-out infinite;
      clip-path: polygon(
        0% 9%,
        100% 0%,
        96% 50%,
        100% 98%,
        0% 93%
      );
    }

    .flag::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.035) 0px,
          rgba(255,255,255,0.035) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity: 0.38;
      clip-path: polygon(
        0% 9%,
        100% 0%,
        96% 50%,
        100% 98%,
        0% 93%
      );
    }

    .wind {
      position: absolute;
      width: 220px;
      height: 4px;
      border-radius: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      animation: windMove 3s linear infinite;
      opacity: 0.7;
      z-index: 3;
    }

    .wind.one {
      top: 120px;
      right: -120px;
      animation-delay: 0s;
    }

    .wind.two {
      top: 230px;
      right: -150px;
      animation-delay: 0.8s;
    }

    .wind.three {
      top: 330px;
      right: -100px;
      animation-delay: 1.5s;
    }

    .note {
      position: relative;
      z-index: 5;
      margin-top: 10px;
      max-width: 900px;
      font-size: 18px;
      color: #f2f2f2;
      line-height: 1.6;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    @keyframes flagSwing {
      0%, 100% {
        transform: rotateY(-8deg) rotateZ(-1deg) translateY(0);
      }

      50% {
        transform: rotateY(9deg) rotateZ(1.4deg) translateY(-10px);
      }
    }

    @keyframes imageWave {
      0%, 100% {
        transform: skewY(0deg) scaleX(1);
        clip-path: polygon(
          0% 9%,
          100% 0%,
          96% 50%,
          100% 98%,
          0% 93%
        );
      }

      25% {
        transform: skewY(-2deg) scaleX(0.985);
        clip-path: polygon(
          0% 4%,
          98% 7%,
          100% 48%,
          97% 96%,
          0% 99%
        );
      }

      50% {
        transform: skewY(2.2deg) scaleX(1.02);
        clip-path: polygon(
          0% 10%,
          100% 3%,
          94% 55%,
          100% 94%,
          0% 91%
        );
      }

      75% {
        transform: skewY(-1.5deg) scaleX(0.995);
        clip-path: polygon(
          0% 5%,
          97% 0%,
          100% 52%,
          96% 100%,
          0% 95%
        );
      }
    }

    @keyframes foldMove {
      0%, 100% {
        transform: translateX(-30px);
      }

      50% {
        transform: translateX(55px);
      }
    }

    @keyframes windMove {
      0% {
        transform: translateX(230px);
        opacity: 0;
      }

      20% {
        opacity: 0.75;
      }

      100% {
        transform: translateX(-950px);
        opacity: 0;
      }
    }

    @keyframes dustMove {
      0%, 100% {
        transform: translateX(-45px) scale(1);
        opacity: 0.45;
      }

      50% {
        transform: translateX(65px) scale(1.18);
        opacity: 0.78;
      }
    }

    @media (max-width: 760px) {
      .flag-scene {
        height: 350px;
      }

      .flag {
        width: 95vw;
        height: 240px;
      }

      .sky-line {
        top: 80px;
      }

      .note {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Newson Sportec</h1>
    <div class="subtitle">Your Logo Flag Waving in the Desert Sky</div>

    <section class="flag-scene">
      <div class="sky-line"></div>

      <div class="flag">
        <!-- Upload logo.png into the same GitHub folder as index.html -->
        <img class="flag-image" src="logo.png" alt="Newson Sportec waving flag">
      </div>

      <div class="wind one"></div>
      <div class="wind two"></div>
      <div class="wind three"></div>
    </section>

    <p class="note">
      The Newson Sportec logo is now used as a large waving flag in the sky.
      It includes moving fabric folds, wind lines, desert dust, and sunset racing energy.
    </p>
  </main>
</body>
</html>
