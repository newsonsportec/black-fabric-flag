<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newson Sportec Waving Flag</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at center, #2b2b2b 0%, #0b0b0b 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 1000px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* Metal pole */
    .pole {
      position: absolute;
      left: 120px;
      top: 70px;
      width: 28px;
      height: 480px;
      background: linear-gradient(
        90deg,
        #555,
        #d9d9d9,
        #777,
        #f5f5f5,
        #444
      );
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
      z-index: 10;
    }

    .pole-top {
      position: absolute;
      left: 104px;
      top: 35px;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, #ffffff, #777);
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.35);
      z-index: 11;
    }

    /* Flag wrapper */
    .flag {
      position: absolute;
      left: 145px;
      top: 105px;
      width: 720px;
      height: 330px;
      display: flex;
      transform-style: preserve-3d;
      filter: drop-shadow(30px 35px 35px rgba(0, 0, 0, 0.7));
    }

    /* Each strip moves slightly differently to create a wave */
    .stripe {
      width: 10%;
      height: 100%;
      background-image:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.12),
          rgba(0, 0, 0, 0.3),
          rgba(255, 255, 255, 0.08)
        ),
        url("logo.png");
      background-size: 720px 330px;
      background-repeat: no-repeat;
      background-color: #050505;
      animation: wave 2.2s ease-in-out infinite;
      transform-origin: left center;
      border-top: 2px solid rgba(255, 255, 255, 0.08);
      border-bottom: 2px solid rgba(255, 255, 255, 0.08);
    }

    .stripe:nth-child(1) {
      background-position: 0px 0;
      animation-delay: 0s;
    }

    .stripe:nth-child(2) {
      background-position: -72px 0;
      animation-delay: -0.12s;
    }

    .stripe:nth-child(3) {
      background-position: -144px 0;
      animation-delay: -0.24s;
    }

    .stripe:nth-child(4) {
      background-position: -216px 0;
      animation-delay: -0.36s;
    }

    .stripe:nth-child(5) {
      background-position: -288px 0;
      animation-delay: -0.48s;
    }

    .stripe:nth-child(6) {
      background-position: -360px 0;
      animation-delay: -0.60s;
    }

    .stripe:nth-child(7) {
      background-position: -432px 0;
      animation-delay: -0.72s;
    }

    .stripe:nth-child(8) {
      background-position: -504px 0;
      animation-delay: -0.84s;
    }

    .stripe:nth-child(9) {
      background-position: -576px 0;
      animation-delay: -0.96s;
    }

    .stripe:nth-child(10) {
      background-position: -648px 0;
      animation-delay: -1.08s;
    }

    @keyframes wave {
      0% {
        transform: rotateY(18deg) translateY(0px);
        filter: brightness(0.85);
      }

      25% {
        transform: rotateY(-12deg) translateY(-10px);
        filter: brightness(1.15);
      }

      50% {
        transform: rotateY(16deg) translateY(6px);
        filter: brightness(0.75);
      }

      75% {
        transform: rotateY(-18deg) translateY(-6px);
        filter: brightness(1.1);
      }

      100% {
        transform: rotateY(18deg) translateY(0px);
        filter: brightness(0.85);
      }
    }

    /* Cloth texture overlay */
    .flag::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0px,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 8px
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 1px,
          transparent 7px
        );
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Left sleeve connected to pole */
    .flag-sleeve {
      position: absolute;
      left: 135px;
      top: 105px;
      width: 30px;
      height: 330px;
      background: linear-gradient(90deg, #050505, #222, #050505);
      border-left: 2px solid rgba(255, 255, 255, 0.2);
      border-right: 2px solid rgba(255, 255, 255, 0.1);
      z-index: 9;
    }

    .title {
      position: absolute;
      bottom: 35px;
      width: 100%;
      text-align: center;
      color: #ff8800;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 128, 0, 0.8),
        0 0 25px rgba(255, 128, 0, 0.5);
    }

    .subtitle {
      position: absolute;
      bottom: 5px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 18px;
      letter-spacing: 3px;
      opacity: 0.85;
    }

    @media (max-width: 900px) {
      .scene {
        width: 100vw;
        height: 100vh;
        transform: scale(0.75);
      }
    }

    @media (max-width: 600px) {
      .scene {
        transform: scale(0.5);
      }
    }
  </style>
</head>

<body>
  <div class="scene">

    <div class="pole-top"></div>
    <div class="pole"></div>
    <div class="flag-sleeve"></div>

    <div class="flag">
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
      <div class="stripe"></div>
    </div>

    <div class="title">Newson Sportec</div>
    <div class="subtitle">RIDE · BUILD · PERFORM</div>

  </div>
</body>
</html>
