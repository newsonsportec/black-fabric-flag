<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Newson Sportec Waving Flag</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      overflow: hidden;

      /* Desert sunset background */
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 174, 66, 0.75), transparent 18%),
        linear-gradient(
          to bottom,
          #1a1a2e 0%,
          #3a1c3f 28%,
          #9b3d18 58%,
          #d8781d 78%,
          #2b1608 100%
        );
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Soft desert ground */
    .page::before {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -80px;
      height: 260px;
      background:
        radial-gradient(circle at 30% 40%, rgba(255, 170, 65, 0.35), transparent 35%),
        linear-gradient(to top, #160b04, #7a3b12, transparent);
      border-radius: 50% 50% 0 0;
      z-index: 0;
    }

    /* Moving dust */
    .page::after {
      content: "";
      position: absolute;
      left: -20%;
      bottom: 120px;
      width: 140%;
      height: 130px;
      background:
        radial-gradient(circle, rgba(255, 210, 140, 0.22) 0%, transparent 55%),
        radial-gradient(circle, rgba(255, 180, 90, 0.18) 0%, transparent 60%);
      filter: blur(25px);
      animation: dustMove 6s ease-in-out infinite;
      z-index: 1;
    }

    h1 {
      position: relative;
      z-index: 3;
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 76px);
      letter-spacing: 4px;
      color: #ff8a00;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255, 138, 0, 0.8),
        0 0 30px rgba(255, 138, 0, 0.45);
    }

    .subtitle {
      position: relative;
      z-index: 3;
      margin-bottom: 40px;
      font-size: clamp(16px, 2vw, 26px);
      color: #f1f1f1;
      letter-spacing: 2px;
    }

    .flag-scene {
      position: relative;
      z-index: 3;
      width: min(1000px, 94vw);
      height: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    /* Flag only, no pole */
    .flag {
      position: relative;
      width: min(850px, 90vw);
      height: 330px;
      transform-style: preserve-3d;
      transform-origin: left center;
      animation: flagSwing 4s ease-in-out infinite;
      filter:
        drop-shadow(0 35px 35px rgba(0,0,0,0.75))
        drop-shadow(0 0 25px rgba(255,138,0,0.18));
    }

    /* Main flag fabric */
    .fabric {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 18px;
      background:
        linear-gradient(
          90deg,
          #020202 0%,
          #141414 12%,
          #050505 25%,
          #1d1d1d 38%,
          #030303 50%,
          #171717 63%,
          #050505 78%,
          #1a1a1a 100%
        );
      clip-path: polygon(
        0% 7%,
        100% 0%,
        94% 50%,
        100% 100%,
        0% 93%
      );
      animation: fabricWave 2.8s ease-in-out infinite;
    }

    /* Cloth folds */
    .fabric::before {
      content: "";
      position: absolute;
      inset: -25px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.13), transparent 16%),
        radial-gradient(circle at 45% 55%, rgba(255,255,255,0.09), transparent 18%),
        radial-gradient(circle at 75% 35%, rgba(255,255,255,0.12), transparent 20%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.14) 0px,
          rgba(255,255,255,0.03) 28px,
          rgba(0,0,0,0.55) 58px,
          rgba(0,0,0,0.1) 95px
        );
      mix-blend-mode: screen;
      opacity: 0.55;
      animation: foldMove 2.8s ease-in-out infinite;
    }

    /* Fabric texture */
    .fabric::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.035) 0px,
          rgba(255,255,255,0.035) 1px,
          transparent 1px,
          transparent 5px
        );
      opacity: 0.35;
      pointer-events: none;
    }

    .logo-area {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: left center;
      animation: logoWave 2.8s ease-in-out infinite;
    }

    .logo-box {
      width: 78%;
      max-width: 650px;
      padding: 28px 35px;
      border: 4px solid #ff8a00;
      background: rgba(0,0,0,0.52);
      transform: skewX(-8deg);
      box-shadow:
        inset 0 0 30px rgba(255,138,0,0.12),
        0 0 26px rgba(255,138,0,0.25);
    }

    .brand {
      font-size: clamp(36px, 6vw, 86px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: 5px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255,255,255,0.35),
        4px 4px 0 rgba(0,0,0,0.8);
    }

    .sportec {
      margin-top: 14px;
      font-size: clamp(22px, 3vw, 45px);
      font-weight: 900;
      letter-spacing: 10px;
      color: #ff8a00;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(255,138,0,0.65),
        3px 3px 0 rgba(0,0,0,0.8);
    }

    .slogan {
      margin-top: 22px;
      font-size: clamp(15px, 2vw, 28px);
      font-weight: 900;
      letter-spacing: 6px;
      color: #ff8a00;
      text-transform: uppercase;
    }

    .wind {
      position: absolute;
      width: 190px;
      height: 4px;
      border-radius: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      animation: windMove 3s linear infinite;
      opacity: 0.65;
      z-index: 2;
    }

    .wind.one {
      top: 110px;
      right: -100px;
      animation-delay: 0s;
    }

    .wind.two {
      top: 210px;
      right: -130px;
      animation-delay: 0.8s;
    }

    .wind.three {
      top: 300px;
      right: -90px;
      animation-delay: 1.5s;
    }

    .note {
      position: relative;
      z-index: 3;
      margin-top: 25px;
      max-width: 850px;
      font-size: 18px;
      color: #f0f0f0;
      line-height: 1.6;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    }

    @keyframes flagSwing {
      0%, 100% {
        transform: rotateY(-7deg) rotateZ(0deg);
      }
      50% {
        transform: rotateY(8deg) rotateZ(1.2deg);
      }
    }

    @keyframes fabricWave {
      0%, 100% {
        transform: skewY(0deg) scaleX(1);
        clip-path: polygon(
          0% 7%,
          100% 0%,
          94% 50%,
          100% 100%,
          0% 93%
        );
      }
      25% {
        transform: skewY(-2deg) scaleX(0.985);
        clip-path: polygon(
          0% 3%,
          98% 6%,
          100% 48%,
          97% 96%,
          0% 100%
        );
      }
      50% {
        transform: skewY(2deg) scaleX(1.015);
        clip-path: polygon(
          0% 9%,
          100% 3%,
          92% 54%,
          100% 94%,
          0% 91%
        );
      }
      75% {
        transform: skewY(-1.5deg) scaleX(0.995);
        clip-path: polygon(
          0% 5%,
          97% 0%,
          100% 52%,
          96% 100%,
          0% 95%
        );
      }
    }

    @keyframes foldMove {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(45px);
      }
    }

    @keyframes logoWave {
      0%, 100% {
        transform: translateX(0) skewY(0deg);
      }
      50% {
        transform: translateX(12px) skewY(1.5deg);
      }
    }

    @keyframes windMove {
      0% {
        transform: translateX(200px);
        opacity: 0;
      }
      20% {
        opacity: 0.7;
      }
      100% {
        transform: translateX(-900px);
        opacity: 0;
      }
    }

    @keyframes dustMove {
      0%, 100% {
        transform: translateX(-40px) scale(1);
        opacity: 0.45;
      }
      50% {
        transform: translateX(50px) scale(1.15);
        opacity: 0.75;
      }
    }

    @media (max-width: 760px) {
      .flag-scene {
        height: 360px;
      }

      .flag {
        width: 90vw;
        height: 235px;
      }

      .logo-box {
        padding: 20px 18px;
      }

      .sportec {
        letter-spacing: 5px;
      }

      .slogan {
        letter-spacing: 3px;
      }

      .note {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Newson Sportec</h1>
    <div class="subtitle">Black Fabric Flag Waves in the Wind</div>

    <section class="flag-scene">
      <div class="flag">
        <div class="fabric"></div>

        <div class="logo-area">
          <div class="logo-box">
            <div class="brand">Newson</div>
            <div class="sportec">Sportec</div>
            <div class="slogan">Ride • Build • Perform</div>
          </div>
        </div>
      </div>

      <div class="wind one"></div>
      <div class="wind two"></div>
      <div class="wind three"></div>
    </section>

    <p class="note">
      A black fabric flag with the orange Newson Sportec logo waves in the wind.
      The pole has been removed, and the background has been changed to a desert sunset racing style.
    </p>
  </main>
</body>
</html>
